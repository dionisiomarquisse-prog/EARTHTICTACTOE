<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌍 Earth Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#02101f;
}

/* =========================
   BACKGROUND
========================= */

.screen{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at 20% 20%,rgba(0,180,255,.15),transparent 30%),
    radial-gradient(circle at 80% 30%,rgba(50,120,255,.18),transparent 35%),
    linear-gradient(
        to bottom,
        #041a32,
        #021120,
        #000814
    );
}

/* stars */

.screen::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(#8ddfff 1px,transparent 1px);

    background-size:
    70px 70px,
    120px 120px,
    180px 180px;

    opacity:.6;
}

/* =========================
   EARTH
========================= */

.earth{

    position:absolute;

    left:8%;

    top:8%;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    radial-gradient(circle at 35% 30%,
    #bdfcff,
    #46b8ff 25%,
    #1976d2 55%,
    #0b3d91 100%);

    box-shadow:
    0 0 40px rgba(0,180,255,.45);

    animation:floatEarth 8s ease-in-out infinite;
}

/* continents */

.earth::before{

    content:"";

    position:absolute;

    width:55px;
    height:32px;

    background:#2ecc71;

    border-radius:50%;

    top:42px;
    left:35px;

    transform:rotate(-20deg);

    box-shadow:
    40px 50px #3ad86f,
    70px 15px #2ecc71,
    15px 80px #35d96d;
}

/* =========================
   MOON
========================= */

.moon{

    position:absolute;

    right:8%;
    bottom:10%;

    width:140px;
    height:140px;

    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #dcdcdc 60%,
    #8e8e8e);

    box-shadow:
    0 0 20px rgba(255,255,255,.25);

    animation:floatMoon 9s ease-in-out infinite;
}

.moon::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:#9d9d9d;

    top:40px;
    left:40px;

    box-shadow:
    40px 20px #b0b0b0,
    55px 55px #909090,
    20px 70px #bcbcbc;
}

/* =========================
   GAME
========================= */

.game{

    position:relative;

    z-index:5;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:24px;

    padding:40px;
}

.badge{

    padding:10px 18px;

    border-radius:999px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.15);

    color:#dff7ff;

    font-size:12px;

    letter-spacing:2px;

    text-transform:uppercase;
}

h1{

    text-align:center;

    color:white;

    font-size:48px;

    text-transform:uppercase;

    text-shadow:
    0 0 20px rgba(0,180,255,.5);
}

h1 span{

    color:#54ff96;

    text-shadow:
    0 0 20px rgba(84,255,150,.5);
}

#status{

    color:white;

    font-weight:bold;

    letter-spacing:1px;

    font-size:18px;
}
/* =========================
   BOARD
========================= */

.board-wrap{

    padding:20px;

    border-radius:30px;

    backdrop-filter:blur(18px);

    background:rgba(5,25,45,.45);

    border:1px solid rgba(120,220,255,.25);

    box-shadow:
    0 0 35px rgba(0,180,255,.15),
    inset 0 0 30px rgba(255,255,255,.04);
}

.board{

    display:grid;

    grid-template-columns:repeat(3,120px);

    grid-template-rows:repeat(3,120px);

    gap:14px;
}

.cell{

    border-radius:22px;

    border:1px solid rgba(130,220,255,.30);

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.02)
    ),
    rgba(10,40,70,.55);

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    user-select:none;

    font-size:70px;

    font-weight:bold;

    transition:.2s;
}

.cell:hover{

    transform:scale(1.04);

    border-color:#7fe8ff;

    box-shadow:
    0 0 20px rgba(0,210,255,.25);
}

/* =========================
   X PLAYER
========================= */

.cell.x{

    color:#48ff91;

    text-shadow:
    0 0 10px #48ff91,
    0 0 25px rgba(72,255,145,.55);
}

/* =========================
   O PLAYER
========================= */

.cell.o{

    color:#62d8ff;

    text-shadow:
    0 0 10px #62d8ff,
    0 0 25px rgba(98,216,255,.55);
}

/* =========================
   WIN
========================= */

.cell.win{

    border-color:#dffff0;

    background:
    radial-gradient(
        circle,
        rgba(110,255,170,.18),
        transparent 70%
    ),
    rgba(20,80,50,.35);

    box-shadow:
    0 0 18px rgba(110,255,170,.45),
    0 0 45px rgba(0,180,255,.20);
}

/* =========================
   BUTTON
========================= */

button{

    padding:15px 34px;

    border:none;

    border-radius:999px;

    cursor:pointer;

    color:white;

    font-weight:bold;

    letter-spacing:2px;

    background:
    linear-gradient(
        135deg,
        #2196f3,
        #2ecc71
    );

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 18px rgba(0,200,255,.35);
}

/* =========================
   FOOTER
========================= */

.watermark{

    position:absolute;

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    color:rgba(255,255,255,.35);

    font-size:17px;

    letter-spacing:2px;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes floatEarth{

    0%,
    100%{

        transform:translateY(0px);

    }

    50%{

        transform:translateY(-12px);

    }

}

@keyframes floatMoon{

    0%,
    100%{

        transform:translateY(0px);

    }

    50%{

        transform:translateY(10px);

    }

}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    .board{

        grid-template-columns:repeat(3,90px);

        grid-template-rows:repeat(3,90px);

    }

    .cell{

        font-size:54px;

    }

    h1{

        font-size:34px;

    }

    .earth{

        width:120px;
        height:120px;

    }

    .moon{

        width:90px;
        height:90px;

    }

}

</style>

</head>

<body>

<div class="screen">

    <div class="earth"></div>

    <div class="moon"></div>

    <div class="game">

        <div class="badge">
            EARTH EDITION
        </div>
          <audio id="bgMusic" autoplay loop>
    <source src="Your Universe (Acoustic).mp3" type="audio/mpeg">
</audio>

        <h1>
            Earth
            <br>
            <span>Tic Tac Toe</span>
        </h1>

        <div id="status">
            🌍 Turn: X
        </div>

        <div class="board-wrap">

            <div class="board">

                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>

                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>

                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>

            </div>

        </div>

        <button onclick="resetGame()">
            🔄 Restart Game
        </button>

    </div>

    <div class="watermark">
        MADE WITH MINGYU DIONISIO
    </div>
        <script>
        const cells = document.querySelectorAll(".cell");
        const statusText = document.getElementById("status");

        let currentPlayer = "X";
        let gameOver = false;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        cells.forEach((cell) => {
            cell.addEventListener("click", () => {

                if (gameOver || cell.textContent !== "") {
                    return;
                }

                cell.textContent = currentPlayer;
                cell.classList.add(currentPlayer.toLowerCase());

                const winner = getWinningPattern();

                if (winner) {

                    winner.forEach(index => {
                        cells[index].classList.add("win");
                    });

                    statusText.textContent =
                        currentPlayer === "X"
                        ? "🌿 Land Wins!"
                        : "🌊 Ocean Wins!";

                    gameOver = true;
                    return;
                }

                const draw = [...cells].every(
                    cell => cell.textContent !== ""
                );

                if (draw) {
                    statusText.textContent =
                        "🤝 The Earth is Balanced!";
                    gameOver = true;
                    return;
                }

                currentPlayer =
                    currentPlayer === "X"
                    ? "O"
                    : "X";

                statusText.textContent =
                    `🌍 Turn: ${currentPlayer}`;
            });
        });

        function getWinningPattern() {

            for (const pattern of winPatterns) {

                const [a, b, c] = pattern;

                if (
                    cells[a].textContent === currentPlayer &&
                    cells[b].textContent === currentPlayer &&
                    cells[c].textContent === currentPlayer
                ) {
                    return pattern;
                }

            }

            return null;
        }

        function resetGame() {

            cells.forEach(cell => {

                cell.textContent = "";
                cell.classList.remove("x");
                cell.classList.remove("o");
                cell.classList.remove("win");

            });

            currentPlayer = "X";
            gameOver = false;

            statusText.textContent = "🌍 Turn: X";
        }
    </script>

</body>
</html>
